<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Login - Nagar Samadhan</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#F97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Nagar Samadhan">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/notifications-simple.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Touch-friendly buttons */
        .touch-button {
            min-height: 48px;
            min-width: 48px;
            touch-action: manipulation;
        }
        
        /* Prevent zoom on input focus on iOS */
        input, select, textarea {
            font-size: 16px;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .px-6 {
                padding-left: 1rem;
                padding-right: 1rem;
            }
            
            .p-8 {
                padding: 1.5rem;
            }
            
            .max-w-md {
                max-width: 100%;
                margin: 0 1rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <div class="text-3xl font-bold text-gray-800 mb-2">
                <span class="text-orange-500">Nagar</span><span class="text-green-600"> Samadhan</span>
            </div>
            <p class="text-gray-600">Admin Portal Login</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <input type="text" id="username" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition duration-200"
                       placeholder="Enter admin username">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition duration-200"
                       placeholder="Enter admin password">
            </div>

            <button type="submit" 
                    class="touch-button w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white font-semibold py-3 rounded-lg hover:from-orange-600 hover:to-orange-700 transform hover:scale-105 active:scale-95 transition duration-200 shadow-lg">
                Login to Admin Portal
            </button>
        </form>


    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : 'https://nagar-samadhan1-o.onrender.com';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitButton = e.target.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.textContent = 'Logging in...';

            try {
                const response = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json().catch(() => ({}));

                if (!response.ok) {
                    throw new Error(result.error || 'Invalid username or password');
                }

                sessionStorage.setItem('adminToken', result.token);
                sessionStorage.setItem('adminTokenExpiresAt', String(result.expiresAt));
                window.location.href = '/admin.html';
            } catch (error) {
                notifications.error(error.message || 'Unable to login. Please try again.', {
                    title: 'Login Failed'
                });
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                document.getElementById('username').focus();
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Login to Admin Portal';
            }
        });
    </script>
</body>
</html>
